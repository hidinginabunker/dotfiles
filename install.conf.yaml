- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.editorconfig: editorconfig
    ~/.eslintrc: eslintrc
    ~/.gitconfig: gitconfig
    ~/.gitignore: gitignore
    ~/.profile: profile
    ~/.tmux.conf: tmux.conf
    ~/.vim: vim
    ~/.vimrc: vimrc
    ~/.zprofile: zprofile
    ~/.zshrc: zshrc
    ~/.config/starship.toml: starship.toml

- shell:
  - [git submodule update --init --recursive, Installing submodules]
